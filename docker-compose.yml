services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    ports: ["1025:1025", "8025:8025"]

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    ports: ["8000:8000"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: ["./backend:/code"]

  worker:
    build: ./backend
    env_file: .env
    depends_on:
      - postgres
      - redis
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes: ["./backend:/code"]

  # The ADK lives in its own repo (demand_forecasting_adk) with an adk_service/ wrapper.
  # Uncomment and point `context` at that repo to run it alongside:
  # adk-service:
  #   build:
  #     context: ../../../PycharmProjects/demand_forecasting_adk
  #   env_file: .env
  #   environment:
  #     GOOGLE_API_KEY: ${GOOGLE_API_KEY}
  #     ADK_SECRET: ${ADK_SECRET}
  #     DATABASE_URL: ${DATABASE_URL}
  #     REDIS_URL: ${REDIS_URL}
  #   depends_on: [postgres, redis]
  #   ports: ["9000:9000"]
  #   volumes: ["adk_artifacts:/app/.adk"]

volumes:
  pgdata:
  adk_artifacts:
